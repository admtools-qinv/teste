workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: experiments/onboarding_reference/flutter/example
    integrations:
      app_store_connect: Codemagic API
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.qinvapp.mobile" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@env:CM_CERTIFICATE_PRIVATE_KEY
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS
        script: |
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
