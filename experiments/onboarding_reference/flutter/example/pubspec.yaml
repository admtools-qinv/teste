name: onboarding_reference_example
description: Example runner for the onboarding_reference package
publish_to: none
version: 0.0.1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  onboarding_reference:
    path: ..
  shared_preferences: ^2.3.3
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: ../fonts/PlayfairDisplay-Regular.ttf
          weight: 400
        - asset: ../fonts/PlayfairDisplay-SemiBold.ttf
          weight: 600
        - asset: ../fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: ../fonts/PlayfairDisplay-Italic.ttf
          weight: 400
          style: italic
        - asset: ../fonts/PlayfairDisplay-BoldItalic.ttf
          weight: 700
          style: italic
    - family: LibreBaskerville
      fonts:
        - asset: ../fonts/LibreBaskerville-Regular.ttf
          weight: 400
        - asset: ../fonts/LibreBaskerville-Bold.ttf
          weight: 700
        - asset: ../fonts/LibreBaskerville-Italic.ttf
          weight: 400
          style: italic
