name: onboarding_reference
description: Production-ready onboarding reference flow for QInvWeb3
publish_to: none
version: 0.2.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_tts: ^4.0.2
  just_audio: ^0.9.42
  flutter_svg: ^2.0.0
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  flutter_animate: ^4.5.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/account_national.svg
    - assets/account_global.svg
    - assets/google_icon.svg
    - assets/qinv_logo.svg
    - assets/qinv_wordmark.svg
    - assets/btc.png
    - assets/xrp.png
    - assets/sol.png
    - assets/audio/en/
    - assets/audio/pt/
    - assets/showcase/
    - assets/logos/

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: fonts/PlayfairDisplay-Regular.ttf
          weight: 400
        - asset: fonts/PlayfairDisplay-SemiBold.ttf
          weight: 600
        - asset: fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: fonts/PlayfairDisplay-Italic.ttf
          weight: 400
          style: italic
        - asset: fonts/PlayfairDisplay-BoldItalic.ttf
          weight: 700
          style: italic
    - family: LibreBaskerville
      fonts:
        - asset: fonts/LibreBaskerville-Regular.ttf
          weight: 400
        - asset: fonts/LibreBaskerville-Bold.ttf
          weight: 700
        - asset: fonts/LibreBaskerville-Italic.ttf
          weight: 400
          style: italic
    - family: NotoSerifDisplay
      fonts:
        - asset: fonts/NotoSerifDisplay-Italic.ttf
          style: italic
    - family: PlusJakartaSans
      fonts:
        - asset: fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: fonts/PlusJakartaSans-Italic.ttf
          weight: 400
          style: italic
        - asset: fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: fonts/PlusJakartaSans-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: fonts/PlusJakartaSans-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: fonts/PlusJakartaSans-BoldItalic.ttf
          weight: 700
          style: italic
